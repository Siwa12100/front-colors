<div class="app-shell">
  <!-- Top bar -->
  <header class="top-bar">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="8" fill="#D97706" />
        <path d="M6 22l6-8 4 5 3-3 7 6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="10" cy="12" r="2.5" fill="#fff" />
      </svg>
      <span class="brand-name">Colors</span>
    </div>

    <!-- Search bar centered -->
    <div class="search-wrap">
      <app-search-bar (filtersApplied)="onFiltersApplied($event)" />
    </div>

    <div class="top-right">
      <div class="view-toggle">
        <button [class.active]="viewMode() === 'grid'" (click)="setViewMode('grid')" title="Grille">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
          </svg>
        </button>
        <button [class.active]="viewMode() === 'masonry'" (click)="setViewMode('masonry')" title="Mosaïque">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <rect x="3" y="3" width="7" height="11" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="3" y="17" width="7" height="4" />
            <rect x="14" y="13" width="7" height="8" />
          </svg>
        </button>
      </div>
      <app-user-menu />
    </div>
  </header>

  <div class="main-layout">
    <!-- Workspace content -->
    <main class="workspace-content">
      @if (svc.activeWorkspace(); as ws) {
      <!-- Workspace header -->
      <div class="ws-content-header">
        <div>
          <h1 class="ws-content-title">{{ ws.name }}</h1>
          @if (ws.description) {
          <p class="ws-content-desc">{{ ws.description }}</p>
          }
        </div>

        <div class="ws-actions">
          <button class="btn-action" (click)="toggleCreateFolder()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
              <line x1="12" y1="11" x2="12" y2="17" />
              <line x1="9" y1="14" x2="15" y2="14" />
            </svg>
            Nouveau dossier
          </button>
        </div>
      </div>

      <!-- Create folder form -->
      @if (showCreateFolder()) {
      <div class="create-folder-bar">
        <svg viewBox="0 0 24 24" fill="currentColor" style="color: #D97706; width: 18px; height: 18px;">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
        </svg>
        <input class="folder-name-input" type="text" placeholder="Nom du dossier..." [value]="newFolderName()"
          (input)="onFolderNameChange($any($event.target).value)" (keyup.enter)="createFolder()" autofocus />
        <button class="btn-confirm-folder" (click)="createFolder()" [disabled]="!newFolderName()">Créer</button>
        <button class="btn-dismiss" (click)="dismissCreateFolder()">Annuler</button>
      </div>
      }

      <!-- Folders section -->
      @if (folders().length > 0) {
      <section class="folders-section">
        <div class="section-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
          </svg>
          Dossiers
        </div>
        <div class="folders-grid">
          @for (folder of folders(); track folder.id) {
          <app-folder [folder]="folder" (folderUpdated)="loadFolders()" />
          }
        </div>
      </section>
      }

      <!-- Photos section -->
      <app-image-gallery [filterParams]="activeFilters()" (openDetail)="openDetail($event)" />
      }
    </main>

    <!-- Sidebar -->
    <app-workspace-sidebar />
  </div>
</div>

<!-- Modal -->
@if (selectedPhoto()) {
<app-image-detail-page [photo]="selectedPhoto()!" (close)="closeDetail()" />
}
