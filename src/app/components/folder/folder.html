<div class="folder-wrap">
  <div class="folder-header" (click)="toggleExpanded()" (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)" (drop)="onDrop($event)" [class.drag-over]="isDragOver()">
    <div class="folder-left">
      <svg class="chevron" [class.open]="expanded()" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <polyline points="9 18 15 12 9 6" />
      </svg>
      <svg class="folder-icon" viewBox="0 0 24 24" fill="currentColor" [style.color]="folder().color ?? '#D97706'">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
      </svg>
      <span class="folder-name">{{ folder().name }}</span>
      <span class="folder-count">{{ folder().photoIds.length }}</span>
    </div>

    <div class="folder-actions">
      <button class="btn-folder-action" (click)="$event.stopPropagation(); toggleRename()" title="Renommer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 20h9" />
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
        </svg>
      </button>
      <button class="btn-folder-action" (click)="$event.stopPropagation(); toggleCreateSub()"
        title="Créer un sous-dossier">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
      </button>
    </div>
  </div>

  @if (showCreateSub()) {
  <div class="create-sub-form" (click)="$event.stopPropagation()">
    <input class="sub-input" type="text" placeholder="Nom du sous-dossier" [value]="newSubName()"
      (input)="onSubNameChange($any($event.target).value)" (keyup.enter)="createSubFolder()" autofocus />
    <button class="btn-confirm" (click)="createSubFolder()">OK</button>
    <button class="btn-discard" (click)="closeCreateSub()">×</button>
  </div>
  }

  @if (showRename()) {
  <div class="create-sub-form" (click)="$event.stopPropagation()">
    <input class="sub-input" type="text" placeholder="Nouveau nom..." [value]="renameName()"
      (input)="onRenameChange($any($event.target).value)" (keyup.enter)="renameFolder()" autofocus />
    <button class="btn-confirm" (click)="renameFolder()">OK</button>
    <button class="btn-discard" (click)="closeRename()">×</button>
  </div>
  }

  @if (expanded()) {
  <div class="folder-content">
    <!-- Sub folders -->
    @for (sub of subFolders(); track sub.id) {
    <div class="sub-folder-wrap">
      <app-folder [folder]="sub" />
    </div>
    }

    <!-- Photos grid -->
    @if (photos().length > 0) {
    <div class="folder-photos-grid">
      @for (photo of photos(); track photo.id) {
      <app-image-card [photo]="photo" (openDetail)="openDetail($event)" />
      }
    </div>
    } @else {
    <div class="folder-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <rect x="3" y="3" width="18" height="18" rx="2" />
        <circle cx="8.5" cy="8.5" r="1.5" />
        <polyline points="21 15 16 10 5 21" />
      </svg>
      <span>Dossier vide</span>
    </div>
    }
  </div>
  }
</div>

@if (selectedPhoto()) {
<app-image-detail-page [photo]="selectedPhoto()!" (close)="closeDetail()" />
}
