<div class="card-menu-wrap">
    <button class="btn-card-menu" (click)="toggle($event); $event.stopPropagation()">
        <svg viewBox="0 0 24 24" fill="currentColor">
            <circle cx="12" cy="5" r="1.5" />
            <circle cx="12" cy="12" r="1.5" />
            <circle cx="12" cy="19" r="1.5" />
        </svg>
    </button>

    @if (open()) {
    <div class="card-menu" [style.left.px]="pos()!.x" [style.top.px]="pos()!.y" (click)="$event.stopPropagation()">
        <button class="card-menu-item" (click)="onMoveToFolder()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
            </svg>
            Déplacer vers un dossier
        </button>
        <button class="card-menu-item danger" (click)="onRemoveFromContext()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6" />
                <path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2" />
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                <line x1="10" y1="11" x2="10" y2="17" />
                <line x1="14" y1="11" x2="14" y2="17" />
            </svg>
            Retirer du dossier
        </button>
    </div>
    }
    @if (showPicker()) {
    <app-folder-picker-modal (close)="showPicker.set(false)" (folderSelected)="onFolderSelected($event)" />
    }
</div>
