<article class="image-card" (mouseenter)="onMouseEnter()" (mouseleave)="onMouseLeave()">
  <div class="card-image-link" (click)="openDetail.emit(photo())"
    (dragstart)="$event.preventDefault(); $event.stopPropagation()" [attr.aria-label]="'Voir ' + photo().name">
    <!-- Skeleton loader -->
    @if (!loaded()) {
    <div class="skeleton"></div>
    }

    <img draggable="false" [src]="photo().thumbnailLink" [alt]="photo().name" class="card-image"
      [class.loaded]="loaded()" (load)="onImageLoad()" loading="lazy" (error)="onImageError($event)" />

    <!-- Overlay on hover -->
    <div class="card-overlay" [class.visible]="hovered()">
      <div class="overlay-top">
        <span class="photo-format">{{ (photo().name.match(/\.(\w+)$/)?.[1] ?? 'unknown').toUpperCase() }}</span>
        <span class="photo-size">{{ formatSize(photo().size) }}</span>
      </div>

      <div class="overlay-center">
        <svg class="zoom-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35M11 8v6M8 11h6" />
        </svg>
      </div>

      <div class="overlay-bottom">
        <div class="tags-preview">
          @for (tag of photo().tags.slice(0, 3); track tag) {
          <span class="mini-tag">#{{ tag.name }}</span>
          }
          @if (photo().tags.length > 3) {
          <span class="mini-tag more">+{{ photo().tags.length - 3 }}</span>
          }
        </div>
      </div>
    </div>
  </div>

  <div class="card-footer">
    <span class="photo-name" [title]="photo().name">{{ photo().name }}</span>
    <app-image-card-menu [photo]="photo()" (moveToFolder)="moveToFolder.emit($any($event))"   (removeFromContext)="removeFromContext.emit($event)"
/>
  </div>
</article>
