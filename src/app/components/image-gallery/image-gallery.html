@if (loading()) {
<div class="gallery-loading">
    <span>Chargement des images...</span>
</div>
}

@if (error()) {
<div class="gallery-error">
    <span>{{ error() }}</span>
</div>
}

@if (!loading() && !error()) {
<div class="gallery-grid">
    @for (photo of photos(); track photo.id) {
    <app-image-card [photo]="photo" (openDetail)="onOpenDetail($event)" />
    }

    @if (photos().length === 0) {
    <p class="gallery-empty">Aucune image disponible.</p>
    }
</div>
}
