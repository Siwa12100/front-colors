kind: pipeline
type: docker
name: ci-main

trigger:
  branch:
    - main
  event:
    - push

volumes:
  - name: shared-volume
    temp: {}

steps:
  - name: "🛠 build"
    image: node:22-alpine
    commands:
      - echo "🛠 [INFO] Build du projet Colors..."
      - npm ci || {
          echo "❌ [ERROR] L'installation des dépendances a échoué.";
          exit 1;
        }
      - npx ng build --configuration production || {
          echo "❌ [ERROR] Le build a échoué.";
          exit 1;
        }
      - echo "✅ [SUCCESS] Build terminé avec succès."

